name: FinSage CI/CD Pipeline

# ---------------------------------------------------------------------------
# Triggers
# Push to main  → full validate + deploy to prod.
# Pull request  → validate + unit tests only (no deploy).
# ---------------------------------------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Job 1: Unit tests
  # Runs on every push and PR; fastest gate in the pipeline.
  # ─────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short --cov=databricks/notebooks --cov-report=term-missing

  # ─────────────────────────────────────────────────────────────────────────
  # Job 2: Bundle validate
  # Ensures the DAB config is syntactically and semantically correct before
  # any deploy attempt.  Runs on every push to main.
  # ─────────────────────────────────────────────────────────────────────────
  bundle-validate:
    name: Databricks Bundle Validate
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      # Enterprise Security: Enforcing OAuth M2M Authentication via Service Principal. Legacy PATs are disabled.
      DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Validate bundle configuration
        run: databricks bundle validate

  # ─────────────────────────────────────────────────────────────────────────
  # Job 3: Deploy to production
  # Runs only after unit tests pass AND the bundle validates successfully.
  # Deploys to the `prod` target defined in databricks.yml.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: bundle-validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      # Enterprise Security: Enforcing OAuth M2M Authentication via Service Principal. Legacy PATs are disabled.
      DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Deploy bundle to production
        run: databricks bundle deploy -t prod

      - name: Notify on deployment success
        if: success()
        run: |
          echo "Deployment to prod complete."
          echo "Job: finsage_daily_run | Commit: ${{ github.sha }}"
