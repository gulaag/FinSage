# ==============================================================================
# FinSage — Databricks Asset Bundle (DAB) Configuration
#
# A DAB is the Databricks-native way to define, deploy, and version-control
# Jobs, Pipelines, and other workspace resources as code.
#
# This file is the single source of truth for the FinSage job topology.
# The Databricks CLI reads it and translates it into REST API calls:
#   databricks bundle deploy -t dev    # deploy to dev
#   databricks bundle deploy -t prod   # deploy to prod (CI only)
#   databricks bundle run -t dev finsage_daily_run   # trigger a manual run
#
# Relationship to Terraform:
#   Terraform (terraform/main.tf) manages long-lived infrastructure that
#   outlasts any single deploy: cluster policies, secret scopes, and SP lookup.
#   This DAB file manages the job definition itself and is redeployed on every
#   push to main. The two tools are complementary, not competing.
# ==============================================================================

# ── 1. Bundle Identity ─────────────────────────────────────────────────────────
# The bundle name is a unique identifier for this project across all workspaces.
# It is used as a namespace prefix in the Databricks backend state.
bundle:
  name: finsage_pipeline

# ── 2. Input Variables ─────────────────────────────────────────────────────────
# Variables act as parameters for the entire bundle. They have defaults here
# and can be overridden two ways:
#   a) Per-target block (see the `targets` section below)
#   b) CLI flag at deploy time:
#        databricks bundle deploy -t prod --var catalog=main --var ticker_filter=AAPL,MSFT
#
# Every variable is injected into notebook tasks via `base_parameters`, which
# means notebooks read them with dbutils.widgets.get("variable_name").
# This pattern avoids hardcoding environment-specific values in notebook code.
variables:
  cluster_spark_version:
    default: "14.3.x-scala2.12"
    description: "Databricks Runtime version for the shared job cluster."
  cluster_node_type: 
    default: "i3.xlarge"
    description: "EC2 instance type for the shared job cluster."
  catalog:
    default: "main"
    description: >
      Unity Catalog catalog name. Override to 'dev_catalog' in environments
      that use a separate catalog for isolation.
  env:
    default: "dev"
    description: "Deployment environment label (dev / prod). Injected into every notebook."
  ticker_filter:
    default: ""
    description: >
      Comma-separated ticker symbols to process (e.g. 'AAPL,MSFT,GOOGL').
      Empty string means all 30 tickers in the default list.
  start_date:
    default: "2020-01-01"
    description: "Earliest SEC filing date to ingest (ISO 8601)."
  notification_email:
    default: "digvijay@arsaga.jp"
    description: "Email address for job failure alerts. Override with a team DL in prod."

# ── 3. Resources ───────────────────────────────────────────────────────────────
# The resources block declares all Databricks objects this bundle owns.
# Currently: one Job. Could be extended to include Pipelines, Model Serving
# endpoints, or Dashboards in the future.
#
# On `bundle deploy`, the CLI creates or updates these resources via the
# Databricks Jobs API. On `bundle destroy`, they are deleted.
resources:
  jobs:
    finsage_daily_run:
      name: finsage_daily_run
      description: >
        FinSage end-to-end Medallion pipeline:
        schema setup → bronze ingestion → silver decoding → gold metrics → vector chunking.

      # ── Job execution identity ──────────────────────────────────────────────
      # run_as controls WHICH IDENTITY runs the job at execution time.
      # This is separate from the deployment identity (the CI service principal
      # that runs `bundle deploy`). Two different concerns, two different SPs.
      #
      # run_as is intentionally omitted for dev — the job runs as the
      # authenticated user (U2M OAuth via 'databricks auth login').
      # In production, an admin would uncomment and fill in:
      #   run_as:
      #     service_principal_name: "<SP application ID from Databricks admin console>"
      # This decouples job execution from a human identity and is required for prod.

      # ── Shared Job Cluster ─────────────────────────────────────────────────
      # A job cluster is ephemeral: it starts when the job starts and terminates
      # when the job finishes. We define ONE cluster here and share it across
      # ALL tasks using job_cluster_key references. This avoids the cold-start
      # penalty of spinning up a new cluster per task (~5–8 min each).
      job_clusters:
        - job_cluster_key: finsage_cluster
          new_cluster:
            spark_version: ${var.cluster_spark_version}
            node_type_id:  ${var.cluster_node_type}
            num_workers:   2
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
            # Custom tags flow through to cloud billing (AWS Cost Explorer / Azure Cost Management).
            # Terraform cluster policy enforces these tags cannot be removed by users.
            custom_tags:
              project:    finsage
              managed_by: dab
              env:        ${var.env}

      # ── Tasks ──────────────────────────────────────────────────────────────
      # Tasks are the individual steps of the job. Execution order is controlled
      # by `depends_on` — DAB builds a DAG from these declarations.
      # Here the pipeline is strictly sequential: each task waits for the
      # previous one to succeed before starting.
      #
      # `base_parameters` passes runtime variables into each notebook.
      # Inside the notebook, dbutils.widgets.get("catalog") reads them back.
      # This is what enables the same notebook code to run correctly in both
      # dev and prod without any code changes.
      tasks:
        - task_key: schema_setup
          description: "Create Medallion schemas, volumes, and download-log table."
          job_cluster_key: finsage_cluster
          notebook_task:
            notebook_path: ./databricks/notebooks/01_schema_setup.py
            source: WORKSPACE
            base_parameters:
              catalog:       ${var.catalog}
              env:           ${var.env}
              start_date:    ${var.start_date}
              ticker_filter: ${var.ticker_filter}

        - task_key: bronze_autoloader
          description: "Auto Loader stream + SEC CompanyFacts API ingestion into Bronze."
          depends_on:
            - task_key: schema_setup
          job_cluster_key: finsage_cluster
          notebook_task:
            notebook_path: ./databricks/notebooks/02_bronze_autoloader.py
            source: WORKSPACE
            base_parameters:
              catalog:       ${var.catalog}
              env:           ${var.env}
              start_date:    ${var.start_date}
              ticker_filter: ${var.ticker_filter}

        - task_key: silver_decoder
          description: "XBRL JSON flattening + 10-K section extraction into Silver."
          depends_on:
            - task_key: bronze_autoloader
          job_cluster_key: finsage_cluster
          notebook_task:
            notebook_path: ./databricks/notebooks/03_silver_decoder.py
            source: WORKSPACE
            base_parameters:
              catalog:       ${var.catalog}
              env:           ${var.env}
              start_date:    ${var.start_date}
              ticker_filter: ${var.ticker_filter}

        - task_key: gold_metrics
          description: "Canonical metric aggregation, YoY growth, and data-quality scoring."
          depends_on:
            - task_key: silver_decoder
          job_cluster_key: finsage_cluster
          notebook_task:
            notebook_path: ./databricks/notebooks/04_gold_metrics.py
            source: WORKSPACE
            base_parameters:
              catalog:       ${var.catalog}
              env:           ${var.env}
              start_date:    ${var.start_date}
              ticker_filter: ${var.ticker_filter}

        - task_key: vector_chunker
          description: "Token-based chunking and Databricks Vector Search index provisioning."
          depends_on:
            - task_key: gold_metrics
          job_cluster_key: finsage_cluster
          # --- ADD THESE 3 LINES ---
          libraries:
            - pypi:
                package: tiktoken
          # -------------------------
          notebook_task:
            notebook_path: ./databricks/notebooks/05_vector_chunker.py
            source: WORKSPACE
            base_parameters:
              catalog:       ${var.catalog}
              env:           ${var.env}
              start_date:    ${var.start_date}
              ticker_filter: ${var.ticker_filter}

      # ── Schedule ───────────────────────────────────────────────────────────
      # Quartz cron syntax: "seconds minutes hours day-of-month month day-of-week"
      # "0 0 6 * * ?" = every day at 06:00 UTC.
      # pause_status is set to UNPAUSED here (the global default) but is
      # overridden to PAUSED in the dev target below to prevent accidental
      # cron runs consuming cluster credits during development.
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED

      # ── Failure Notifications ──────────────────────────────────────────────
      # Sends an email if any task in the job fails.
      # The recipient is controlled by the notification_email variable so it
      # can be overridden to a team distribution list in prod without code changes.
      email_notifications:
        on_failure:
          - ${var.notification_email}

# ── 4. Targets (Environments) ──────────────────────────────────────────────────
# Targets are named environments. Each target can override variables, workspace
# host, job settings, and the deployment mode.
#
# Deployment mode controls two things:
#   development  → prefixes job names with "[dev <username>]" to prevent
#                  collisions when multiple engineers deploy to the same workspace.
#                  Also relaxes some validation rules.
#   production   → no name prefix. Strict validation. Intended for CI only.
#
# Anything defined under a target's `resources` block deep-merges with the
# top-level resources definition above, allowing surgical overrides (e.g.
# pausing the schedule in dev) without duplicating the entire job config.
targets:

  # ── Dev ────────────────────────────────────────────────────────────────────
  # Personal development environment. Deploy locally with:
  #   databricks bundle deploy          (uses this target by default)
  #   databricks bundle run finsage_daily_run   (trigger a manual run)
  #
  # Authentication: U2M OAuth — run `databricks auth login` once to set up.
  # The job runs as your personal user identity in dev.
  dev:
    default: true        # Used when --target is not specified on the CLI.
    mode: development
    workspace:
      # MANUAL INTERVENTION REQUIRED:
      # If your organisation uses a *separate* dev workspace, update this URL.
      # Currently dev and prod share one workspace; DAB development mode
      # prefixes job names to prevent collisions (e.g. [dev Digvijay] finsage_daily_run).
      host: https://dbc-f33010ed-00fc.cloud.databricks.com/
    variables:
      env: "dev"
    resources:
      jobs:
        finsage_daily_run:
          schedule:
            pause_status: PAUSED   # Never auto-run in dev; trigger manually with 'bundle run'.

          # DEV WORKAROUND: Route all tasks to an existing interactive cluster instead of
          # spinning up a new job cluster. This avoids the PERMISSION_DENIED error when
          # the user account lacks "Allow cluster creation" for automated job compute.
          #
          # MANUAL INTERVENTION REQUIRED:
          # Replace the placeholder below with your actual cluster ID.
          # Find it in: Databricks UI → Compute → your cluster → URL contains the ID
          # e.g. https://dbc-xxxx.cloud.databricks.com/#setting/clusters/1234-567890-abc123/configuration
          #                                                                 ^^^^^^^^^^^^^^^^^^^^
          # Then re-deploy: databricks bundle deploy && databricks bundle run finsage_daily_run
          #
          # Remove this block once the admin grants you job cluster creation permissions.
          # Clear the job_cluster_key from every task so the Jobs API does not
          # try to resolve the new_cluster definition. Both fields cannot coexist.
          job_clusters: []
          tasks:
            - task_key: schema_setup
              job_cluster_key: ""
              existing_cluster_id: "0317-021937-p03vbmz8"
            - task_key: bronze_autoloader
              job_cluster_key: ""
              existing_cluster_id: "0317-021937-p03vbmz8"
            - task_key: silver_decoder
              job_cluster_key: ""
              existing_cluster_id: "0317-021937-p03vbmz8"
            - task_key: gold_metrics
              job_cluster_key: ""
              existing_cluster_id: "0317-021937-p03vbmz8"
            - task_key: vector_chunker
              job_cluster_key: ""
              existing_cluster_id: "0317-021937-p03vbmz8"

  # ── Prod ───────────────────────────────────────────────────────────────────
  # Shared production environment. Deployed exclusively by CI (GitHub Actions)
  # on push to main. Never deploy to prod manually from a local machine.
  #
  # Authentication: M2M OAuth — GitHub Actions passes DATABRICKS_CLIENT_ID and
  # DATABRICKS_CLIENT_SECRET (stored as GitHub Secrets) as environment variables.
  # The Databricks CLI uses these to obtain a short-lived bearer token via the
  # OAuth 2.0 Client Credentials flow and authenticates as the CI service principal.
  prod:
    mode: production
    workspace:
      # MANUAL INTERVENTION REQUIRED:
      # If prod uses a different workspace, update this URL to the prod workspace host.
      host: https://dbc-f33010ed-00fc.cloud.databricks.com/
    variables:
      env:               "prod"
      catalog:           "main"
      cluster_node_type: "i3.2xlarge"   # Larger nodes for production workloads.
      notification_email: "digvijay@arsaga.jp"  # Replace with a team distribution list.
    resources:
      jobs:
        finsage_daily_run:
          # MANUAL INTERVENTION REQUIRED (Ops handoff):
          # Once the Ops team creates the 'finsage-service-principal' in the Databricks
          # Admin Console, replace the placeholder below with its numeric Application ID
          # (e.g. "2801219485612345") and uncomment these lines.
          # This decouples prod job execution from a human identity, as required for enterprise.
          #
          # run_as:
          #   service_principal_name: "<SP numeric application ID — NOT the display name>"
